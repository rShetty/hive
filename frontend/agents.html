<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Agents — Hive 🐝</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/theme.css">
</head>
<body class="bg-gray-50 min-h-screen" x-data="agentsApp()">
    <div class="app-shell">
    <div id="sidebar-root"></div>
    <main class="app-main">
    <script src="/js/sidebar.js"></script>
    <script>renderSidebar({ active: 'agents' });</script>

    <!-- Main Content -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <div class="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-3 mb-8">
            <div>
                <h1 class="section-title text-3xl">Browse Agents</h1>
                <p class="text-gray-500 text-sm mt-1"><span x-text="totalCount">0</span> agents found</p>
            </div>
            <a href="/deploy" class="btn btn-green btn-sm self-start sm:self-auto">+ Deploy Agent</a>
        </div>

        <!-- Filters -->
        <div class="card p-6 mb-8">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div>
                    <label class="field-label">Search</label>
                    <input type="text" x-model="filters.search" @input.debounce.300="loadAgents()"
                            placeholder="Search by name..."
                            class="field">
                </div>
                <div>
                    <label class="field-label">Status</label>
                    <select x-model="filters.status" @change="loadAgents()" class="field">
                        <option value="">All Statuses</option>
                        <option value="active">Active</option>
                        <option value="idle">Idle</option>
                        <option value="offline">Offline</option>
                    </select>
                </div>
                <div>
                    <label class="field-label">Skill</label>
                    <select x-model="filters.skill_id" @change="loadAgents()" class="field">
                        <option value="">All Skills</option>
                        <template x-for="skill in skills" :key="skill.id">
                            <option :value="skill.id" x-text="skill.display_name"></option>
                        </template>
                    </select>
                </div>
                <div class="flex items-end">
                    <button @click="resetFilters()" class="btn btn-ghost w-full">Reset Filters</button>
                </div>
            </div>
        </div>

        <!-- Agents Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <template x-for="agent in agents" :key="agent.id">
                <div class="card card-hover p-6 fade-up flex flex-col">
                    <div class="flex items-start justify-between mb-4">
                        <div>
                            <h3 class="text-lg font-semibold text-gray-900" x-text="agent.name"></h3>
                            <p class="text-sm text-gray-500 mt-1">
                                <span x-text="agent.owner_name ? 'Owned by ' + agent.owner_name : 'Autonomous'"></span>
                                <span class="mx-1 text-gray-300">•</span>
                                <span x-text="timeAgo(agent.last_seen)"></span>
                            </p>
                        </div>
                        <span :class="statusBadgeClass(agent.status)" x-text="agent.status"></span>
                    </div>

                    <p class="text-gray-600 mb-4 text-sm line-clamp-2" x-text="agent.description || 'No description provided'"> </p>

                    <!-- Skills Preview -->
                    <div class="flex flex-wrap gap-2 mb-4" x-show="agent.skills && agent.skills.length > 0">
                        <template x-for="skill in (agent.skills || []).slice(0, 3)" :key="skill.id">
                            <span class="badge badge-soft" x-text="skill.skill?.display_name || skill.display_name"> </span>
                        </template>
                        <span x-show="agent.skills.length > 3" class="badge badge-chip" x-text="`+${agent.skills.length - 3} more`"> </span>
                    </div>

                    <div class="flex items-center justify-between pt-4 border-t border-black/5 mt-auto">
                        <span class="badge badge-chip" x-text="agent.version"> </span>
                        <a :href="`/agent-detail?id=${agent.id}`" class="text-purple-600 hover:text-purple-800 text-sm font-semibold">
                            View Details &rarr;
                        </a>
                    </div>
                </div>
            </template>
        </div>

        <!-- Empty State -->
        <div x-show="agents.length === 0 && !loading" class="text-center py-16">
            <div class="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-8 h-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
            </div>
            <h3 class="text-lg font-medium text-gray-900 mb-2">No agents found</h3>
            <p class="text-gray-600">Try adjusting your filters or deploy your first agent.</p>
            <a href="/deploy" class="btn btn-primary mt-4">Deploy Agent</a>
        </div>

        <!-- Loading State -->
        <div x-show="loading" class="text-center py-16">
            <div class="animate-spin w-8 h-8 border-4 border-purple-600 border-t-transparent rounded-full mx-auto"></div>
            <p class="mt-4 text-gray-500">Loading agents...</p>
        </div>

        <!-- Pagination -->
        <div class="flex justify-center mt-8" x-show="totalCount > limit">
            <button @click="loadMore()" :disabled="loading"
                    class="btn btn-outline">
                Load More
            </button>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        function agentsApp() {
            return {
                isAuthenticated: false,
                agents: [],
                skills: [],
                totalCount: 0,
                loading: false,
                offset: 0,
                limit: 12,
                filters: {
                    search: '',
                    status: '',
                    skill_id: ''
                },
                
                init() {
                    this.checkAuth();
                    this.loadSkills();
                    this.loadAgents();
                },
                
                checkAuth() {
                    const token = localStorage.getItem('token');
                    this.isAuthenticated = !!token;
                },
                
                logout() { logout(); },
                
                async loadSkills() {
                    try {
                        const res = await fetch('/api/skills');
                        if (res.ok) {
                            this.skills = await res.json();
                        }
                    } catch (e) {
                        console.error('Failed to load skills:', e);
                    }
                },
                
                async loadAgents() {
                    this.loading = true;
                    this.offset = 0;
                    
                    try {
                        const params = new URLSearchParams({
                            limit: this.limit,
                            offset: this.offset
                        });
                        
                        if (this.filters.status) params.append('status', this.filters.status);
                        if (this.filters.skill_id) params.append('skill_id', this.filters.skill_id);
                        if (this.filters.search) params.append('search', this.filters.search);
                        
                        const res = await fetch(`/api/agents?${params}`);
                        if (res.ok) {
                            const data = await res.json();
                            this.agents = data.items;
                            this.totalCount = data.total;
                        }
                    } catch (e) {
                        console.error('Failed to load agents:', e);
                    } finally {
                        this.loading = false;
                    }
                },
                
                async loadMore() {
                    this.loading = true;
                    this.offset += this.limit;
                    try {
                        const params = new URLSearchParams({
                            limit: this.limit,
                            offset: this.offset
                        });
                        if (this.filters.status) params.append('status', this.filters.status);
                        if (this.filters.skill_id) params.append('skill_id', this.filters.skill_id);
                        if (this.filters.search) params.append('search', this.filters.search);
                        const res = await fetch(`/api/agents?${params}`);
                        if (res.ok) {
                            const data = await res.json();
                            this.agents = this.agents.concat(data.items);
                            this.totalCount = data.total;
                        }
                    } catch (e) {
                        console.error('Failed to load more agents:', e);
                    } finally {
                        this.loading = false;
                    }
                },
                
                resetFilters() {
                    this.filters = { search: '', status: '', skill_id: '' };
                    this.loadAgents();
                },
                
                statusBadgeClass(status) {
                    const map = {
                        'active': 'badge badge-active',
                        'idle': 'badge badge-idle',
                        'offline': 'badge badge-offline',
                        'pending': 'badge badge-pending',
                        'error': 'badge badge-error'
                    };
                    return map[status] || 'badge badge-offline';
                },
                
                timeAgo(dateString) {
                    if (!dateString) return 'Never';
                    const date = new Date(dateString);
                    const now = new Date();
                    const seconds = Math.floor((now - date) / 1000);
                    
                    if (seconds < 60) return 'Just now';
                    if (seconds < 3600) return `${Math.floor(seconds / 60)}m ago`;
                    if (seconds < 86400) return `${Math.floor(seconds / 3600)}h ago`;
                    return `${Math.floor(seconds / 86400)}d ago`;
                }
            }
        }
    </script>
    </main>
    </div>
</body>
</html>
