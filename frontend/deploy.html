<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deploy Agent — Hive 🐝</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/theme.css">
</head>
<body class="bg-gray-50 min-h-screen" x-data="deployApp()">
    <div id="nav-root"></div>
    <script src="/js/nav.js"></script>
    <script>renderNav({ active: 'deploy' });</script>

    <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <div class="mb-8">
            <h1 class="section-title text-3xl">Deploy New Agent</h1>
            <p class="text-gray-500 mt-2">Choose a deployment mode and configure your agent</p>
        </div>

        <!-- ============ Mode Picker ============ -->
        <div x-show="!mode" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <button @click="mode = 'byoa'; step = 1"
                    class="card card-hover p-6 text-left">
                <div class="w-12 h-12 bg-emerald-100 rounded-xl flex items-center justify-center mb-4">
                    <span class="text-2xl">🔌</span>
                </div>
                <h3 class="text-lg font-semibold text-gray-900 mb-2">Bring Your Own Agent</h3>
                <p class="text-sm text-gray-500">Register an agent running on your own infrastructure.</p>
            </button>
            <button @click="mode = 'openclaw'; step = 1"
                    class="card card-hover p-6 text-left">
                <div class="w-12 h-12 bg-purple-100 rounded-xl flex items-center justify-center mb-4">
                    <span class="text-2xl">🐾</span>
                </div>
                <h3 class="text-lg font-semibold text-gray-900 mb-2">One-Click OpenClaw</h3>
                <p class="text-sm text-gray-500">Deploy OpenClaw on shared infrastructure with a standard skill set.</p>
            </button>
        </div>

        <button x-show="mode && !deploying" @click="mode = null; step = 0; error = ''"
                class="mt-4 text-sm text-gray-500 hover:text-gray-800">&larr; Change deployment mode</button>

        <!-- ============ HOSTED BYOK FLOW ============ -->
        <template x-if="mode === 'byoa'">
            <div class="card p-6">
                <h2 class="text-xl font-semibold mb-1">Bring Your Own Key — Hosted Agent</h2>
                <p class="text-gray-500 mb-6 text-sm">We host the runtime for you. Drop in your model key, choose a framework &amp; tools, and your agent goes live at a platform-assigned endpoint with a chat + dashboard.</p>
                <div class="space-y-5">
                    <div>
                        <label class="field-label">Agent Name *</label>
                        <input type="text" x-model="agent.name" placeholder="My Research Agent" class="field">
                    </div>
                    <div>
                        <label class="field-label">Framework</label>
                        <select x-model="byoa.framework" class="field">
                            <option value="openclaw">OpenClaw</option>
                            <option value="langchain">LangChain</option>
                            <option value="crewai">CrewAI</option>
                            <option value="custom">Custom</option>
                        </select>
                    </div>
                    <div>
                        <label class="field-label">Description</label>
                        <textarea x-model="agent.description" rows="2" placeholder="What does your agent do?" class="field"></textarea>
                    </div>

                    <!-- LLM key -->
                    <div class="border border-black/5 rounded-xl p-4 bg-gray-50/60">
                        <label class="field-label">Model API Key *</label>
                        <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
                            <select x-model="byoa.keyProvider" class="field">
                                <option value="openrouter">OpenRouter</option>
                                <option value="openai">OpenAI</option>
                                <option value="anthropic">Anthropic</option>
                                <option value="google">Google</option>
                            </select>
                            <input type="password" x-model="byoa.keyValue" placeholder="sk-..." class="field sm:col-span-2">
                        </div>
                        <p class="text-xs text-gray-500 mt-1">Stored encrypted. Falls back to the server key if left blank.</p>
                    </div>

                    <!-- Tools -->
                    <div>
                        <label class="field-label">Tools (skills) *</label>
                        <div class="grid grid-cols-2 gap-2">
                            <template x-for="skill in skills" :key="skill.id">
                                <label class="flex items-center p-3 border rounded-lg cursor-pointer hover:bg-gray-50 text-sm transition"
                                        :class="byoa.tools.includes(skill.name) ? 'border-purple-400 bg-purple-50/70 ring-1 ring-purple-300' : 'border-gray-200'">
                                    <input type="checkbox" :value="skill.name" x-model="byoa.tools" class="mr-2 accent-purple-600">
                                    <span x-text="skill.display_name"></span>
                                </label>
                            </template>
                        </div>
                        <p class="text-xs text-gray-500 mt-1" x-show="skills.length === 0">Loading skills…</p>
                    </div>

                    <!-- MCP servers -->
                    <div>
                        <label class="field-label">MCP Servers <span class="text-gray-400 font-normal">(optional)</span></label>
                        <template x-for="(mcp, idx) in byoa.mcpServers" :key="idx">
                            <div class="flex gap-2 mb-2">
                                <input type="text" x-model="mcp.name" placeholder="Server name" class="field flex-1">
                                <input type="url" x-model="mcp.url" placeholder="https://mcp.example.com" class="field flex-[2]">
                                <button type="button" @click="byoa.mcpServers.splice(idx,1)"
                                        class="btn btn-ghost btn-sm px-3">✕</button>
                            </div>
                        </template>
                        <button type="button" @click="byoa.mcpServers.push({name:'',url:''})"
                                class="btn btn-soft btn-sm">+ Add MCP Server</button>
                    </div>

                    <div>
                        <label class="field-label">Tags (comma-separated)</label>
                        <input type="text" x-model="byoa.tagsRaw" placeholder="research, assistant" class="field">
                    </div>
                </div>

                <div x-show="deploying" class="mt-6 flex items-center">
                    <div class="animate-spin w-5 h-5 border-2 border-emerald-600 border-t-transparent rounded-full mr-3"></div>
                    <span class="font-medium text-gray-700">Spinning up your agent…</span>
                </div>
                <div x-show="byoaResult" class="mt-4 p-5 bg-emerald-50/70 border border-emerald-200 rounded-xl text-sm">
                    <p class="font-semibold text-emerald-800 mb-2">🚀 Agent is live!</p>
                    <div class="space-y-1">
                        <p><span class="text-gray-500">ID:</span> <span x-text="byoaResult?.agent_id" class="font-mono"></span></p>
                        <p><span class="text-gray-500">Endpoint:</span> <code class="bg-white px-2 py-0.5 rounded" x-text="byoaResult?.endpoint_url"></code></p>
                        <p><span class="text-gray-500">API Key:</span> <span x-text="byoaResult?.api_key" class="font-mono break-all"></span></p>
                    </div>
                    <p class="text-xs mt-2 text-emerald-700">Save this API key now — it won't be shown again.</p>
                    <div class="mt-3 flex gap-2 flex-wrap">
                        <a :href="byoaResult?.dashboard_url" target="_blank" class="btn btn-accent btn-sm">Open Dashboard</a>
                        <a :href="`/agent-detail?id=${byoaResult?.agent_id}`" class="btn btn-outline btn-sm">View Details</a>
                    </div>
                </div>
                <div x-show="error" class="mt-4 p-4 bg-red-50 text-red-700 rounded-lg" x-text="error"></div>
                <div class="mt-6 flex justify-end">
                    <button @click="deployBYOA()" :disabled="deploying || !agent.name || byoa.tools.length === 0 || !byoa.keyValue"
                            class="btn btn-green">Create Agent</button>
                </div>
            </div>
        </template>

        <!-- ============ ONE-CLICK OPENCLAW FLOW ============ -->
        <template x-if="mode === 'openclaw'">
            <div class="card p-6">
                <h2 class="text-xl font-semibold mb-1">One-Click OpenClaw Deploy</h2>
                <p class="text-gray-500 mb-4 text-sm">Deploys OpenClaw with a standard skill set. Default skills: <span class="font-mono text-xs">terminal, file_ops, web_extract, planning, code_review</span>.</p>
                <div class="space-y-4">
                    <div>
                        <label class="field-label">Agent Name *</label>
                        <input type="text" x-model="agent.name" placeholder="My OpenClaw Agent" class="field">
                    </div>
                    <div>
                        <label class="field-label">Additional Skills</label>
                        <div class="grid grid-cols-2 gap-2">
                            <template x-for="skill in skills.filter(s => !openclawDefaults.includes(s.name))" :key="skill.id">
                                <label class="flex items-center p-3 border rounded-lg cursor-pointer hover:bg-gray-50 text-sm transition"
                                        :class="openclaw.extraSkills.includes(skill.name) ? 'border-purple-400 bg-purple-50/70 ring-1 ring-purple-300' : 'border-gray-200'">
                                    <input type="checkbox" :value="skill.name" x-model="openclaw.extraSkills" class="mr-2 accent-purple-600">
                                    <span x-text="skill.display_name"></span>
                                </label>
                            </template>
                        </div>
                    </div>
                    <div>
                        <label class="field-label">Tags (comma-separated)</label>
                        <input type="text" x-model="openclaw.tagsRaw" placeholder="openclaw, production" class="field">
                    </div>
                </div>
                <div class="mt-6 bg-purple-50/70 rounded-xl p-4 border border-purple-100">
                    <h3 class="font-medium text-purple-900 mb-2 text-sm">Skills to be installed</h3>
                    <div class="flex flex-wrap gap-2">
                        <template x-for="s in openclawDefaults" :key="s">
                            <span class="badge bg-purple-100 text-purple-800" x-text="s"></span>
                        </template>
                        <template x-for="s in openclaw.extraSkills" :key="s">
                            <span class="badge bg-indigo-100 text-indigo-800" x-text="s + ' (extra)'"></span>
                        </template>
                    </div>
                </div>
                <div x-show="deploying" class="mt-6">
                    <div class="flex items-center mb-2">
                        <div class="animate-spin w-5 h-5 border-2 border-purple-600 border-t-transparent rounded-full mr-3"></div>
                        <span class="font-medium text-gray-700" x-text="deployStatus"></span>
                    </div>
                    <div class="w-full bg-gray-200 rounded-full h-2">
                        <div class="bg-purple-600 h-2 rounded-full transition-all" :style="`width: ${deployProgress}%`"></div>
                    </div>
                </div>
                <div x-show="error" class="mt-4 p-4 bg-red-50 text-red-700 rounded-lg" x-text="error"></div>

                <!-- Success result with registration instructions -->
                <div x-show="openclawResult" class="mt-6 p-5 bg-emerald-50/70 border border-emerald-200 rounded-xl">
                    <h3 class="text-lg font-semibold text-emerald-800 mb-3">OpenClaw Deployed Successfully!</h3>

                    <!-- Dashboard URL highlight -->
                    <div class="mb-4 bg-white border border-purple-200 rounded-xl p-3 flex items-center justify-between">
                        <div class="flex items-center space-x-2 min-w-0">
                            <span class="text-lg">🌐</span>
                            <div class="min-w-0">
                                <div class="text-sm font-semibold text-gray-800">Your Agent Dashboard</div>
                                <code class="text-xs text-purple-700 font-mono break-all" x-text="openclawResult?.dashboard_url || openclawResult?.url"></code>
                            </div>
                        </div>
                        <a :href="openclawResult?.dashboard_url || openclawResult?.url" target="_blank"
                           class="btn btn-accent btn-sm flex-shrink-0">
                            Open →
                        </a>
                    </div>

                    <div class="space-y-2 text-sm">
                        <p><strong>Agent ID:</strong> <span x-text="openclawResult?.agent_id"></span></p>
                        <p><strong>URL:</strong> <a :href="openclawResult?.url" x-text="openclawResult?.url" class="text-blue-600 hover:underline" target="_blank"></a></p>
                        <p><strong>API Key:</strong> <code class="bg-gray-100 px-2 py-1 rounded text-xs" x-text="openclawResult?.api_key"></code></p>
                    </div>
                    <div class="mt-4">
                        <h4 class="font-medium text-gray-800 mb-2">Instructions for OpenClaw to join Hive:</h4>
                        <pre class="bg-gray-900 text-emerald-400 p-4 rounded-lg text-xs overflow-x-auto whitespace-pre-wrap" x-text="openclawResult?.registration_prompt"></pre>
                    </div>
                    <div class="mt-4 flex gap-3 flex-wrap">
                        <button @click="navigator.clipboard.writeText(openclawResult?.registration_prompt)"
                                class="btn btn-ghost">Copy Instructions</button>
                        <a :href="`/agent-config?id=${openclawResult?.agent_id}`"
                           class="btn btn-primary">
                            Configure Agent
                        </a>
                        <a :href="`/agent-detail?id=${openclawResult?.agent_id}`"
                            class="btn btn-outline">View Agent</a>
                    </div>
                </div>

                <div x-show="!openclawResult" class="mt-6 flex justify-end">
                    <button @click="deployOpenClaw()" :disabled="deploying || !agent.name"
                            class="btn btn-accent">Deploy OpenClaw</button>
                </div>
            </div>
        </template>
    </div>

    <script src="js/app.js"></script>
    <script>
        function deployApp() {
            return {
                mode: null,
                step: 0,
                agent: { name: '', description: '' },
                skills: [],
                deploying: false,
                deployStatus: '',
                deployProgress: 0,
                error: '',
                byoa: { framework: 'openclaw', keyProvider: 'openrouter', keyValue: '', tools: [], mcpServers: [], tagsRaw: '' },
                byoaResult: null,
                openclawDefaults: ['terminal','file_ops','web_extract','planning','code_review'],
                openclaw: { extraSkills: [], tagsRaw: '' },
                openclawResult: null,

                init() { this.checkAuth(); this.loadSkills(); },
                checkAuth() { if (!localStorage.getItem('token')) window.location.href = '/login'; },
                async loadSkills() {
                    try { const r = await apiFetch('/api/skills'); if (r.ok) this.skills = await r.json(); }
                    catch (e) { console.error('Failed to load skills:', e); }
                },

                // ---- Hosted BYOK ----
                async deployBYOA() {
                    this.deploying = true; this.error = ''; this.byoaResult = null;
                    const tags = this.byoa.tagsRaw.split(',').map(s=>s.trim()).filter(Boolean);
                    const mcpServers = this.byoa.mcpServers
                        .filter(m => m.name && m.url)
                        .map(m => ({ name: m.name, url: m.url, description: '' }));
                    try {
                        const res = await apiFetch('/api/agents/deploy-hosted', {
                            method:'POST', headers: {'Content-Type':'application/json'},
                            body: JSON.stringify({
                                name: this.agent.name,
                                description: this.agent.description,
                                framework: this.byoa.framework,
                                model_key: { provider: this.byoa.keyProvider, key: this.byoa.keyValue },
                                skill_names: this.byoa.tools,
                                mcp_servers: mcpServers,
                                tags: tags
                            })
                        });
                        if (res.ok) this.byoaResult = await res.json();
                        else { const d = await res.json(); this.error = d.detail || 'Deployment failed'; }
                    } catch(e) { this.error = 'Network error.'; }
                    finally { this.deploying = false; }
                },

                // ---- OpenClaw ----
                async deployOpenClaw() {
                    this.deploying = true; this.error = ''; this.openclawResult = null;
                    this.deployStatus = 'Deploying OpenClaw to VPS...'; this.deployProgress = 30;
                    const tags = this.openclaw.tagsRaw.split(',').map(s=>s.trim()).filter(Boolean);
                    try {
                        const res = await apiFetch('/api/agents/deploy-openclaw', {
                            method:'POST', headers: {'Content-Type':'application/json'},
                            body: JSON.stringify({ agent_name:this.agent.name, extra_skill_names:this.openclaw.extraSkills, tags:tags })
                        });
                        if (res.ok) {
                            const data = await res.json();
                            this.deployProgress = 100; this.deployStatus = 'Deployed!';
                            this.openclawResult = data;
                        } else { const d = await res.json(); this.error = d.detail || 'Failed'; }
                    } catch(e) { this.error = 'Network error.'; }
                    finally { this.deploying = false; }
                }
            }
        }
    </script>
</body>
</html>
