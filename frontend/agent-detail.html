<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Detail — Hive 🐝</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="js/app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/theme.css">
</head>
<body class="bg-gray-50 min-h-screen" x-data="agentDetailApp()">
    <div id="nav-root"></div>
    <script src="/js/nav.js"></script>
    <script>renderNav({ active: 'agents' });</script>

    <!-- Main Content -->
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <!-- Loading -->
        <div x-show="loading" class="text-center py-16">
            <div class="animate-spin w-8 h-8 border-4 border-purple-600 border-t-transparent rounded-full mx-auto"></div>
            <p class="mt-4 text-gray-500">Loading agent...</p>
        </div>

        <!-- Not Found -->
        <div x-show="!loading && !agent" class="text-center py-16">
            <div class="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-8 h-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
            </div>
            <h3 class="text-lg font-medium text-gray-900 mb-2">Agent not found</h3>
            <a href="/agents" class="text-purple-600 hover:text-purple-800 font-medium">Browse all agents &rarr;</a>
        </div>

        <!-- Agent Details -->
        <div x-show="agent" class="space-y-6">
            <!-- Header -->
            <div class="card p-6">
                <div class="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-4">
                    <div class="min-w-0">
                        <div class="flex items-center space-x-3">
                            <h1 class="text-3xl font-bold text-gray-900 truncate" x-text="agent.name"></h1>
                            <span :class="statusBadgeClass(agent.status)" x-text="agent.status"></span>
                        </div>
                        <p class="text-gray-600 mt-2" x-text="agent.description || 'No description provided'"> </p>
                    </div>
                    <div class="flex items-center space-x-2 flex-shrink-0 flex-wrap justify-end">
                        <!-- Delegate button — visible to authenticated users for public agents -->
                        <template x-if="isAuthenticated && agent.is_public">
                            <a :href="`/tasks?agent_id=${agent.id}`" class="btn btn-primary">
                                Delegate Task
                            </a>
                        </template>
                        <!-- Link to the agent's OpenClaw dashboard (owner only) -->
                        <template x-if="isOwner && agent.slug">
                            <a :href="`/a/${agent.slug}/`" target="_blank" class="btn btn-accent">
                                🌐 Open Dashboard
                            </a>
                        </template>
                        <!-- Owner controls -->
                        <template x-if="isOwner">
                            <div class="flex items-center space-x-2">
                                <a :href="`/agent-config?id=${agent.id}`" class="btn btn-outline btn-sm">
                                    Configure
                                </a>
                                <button @click="restartAgent()" :disabled="restarting" class="btn btn-ghost btn-sm">
                                    <span x-show="!restarting">Restart</span>
                                    <span x-show="restarting">...</span>
                                </button>
                                <button @click="deleteAgent()" class="btn btn-danger-soft btn-sm">
                                    Delete
                                </button>
                            </div>
                        </template>
                    </div>
                </div>

                <div class="mt-6 grid grid-cols-1 md:grid-cols-3 gap-4 text-sm">
                    <div>
                        <span class="text-gray-500">Version:</span>
                        <span class="ml-2 font-medium" x-text="agent.version"></span>
                    </div>
                    <div>
                        <span class="text-gray-500">Last Seen:</span>
                        <span class="ml-2 font-medium" x-text="timeAgo(agent.last_seen)"></span>
                    </div>
                    <div>
                        <span class="text-gray-500">Created:</span>
                        <span class="ml-2 font-medium" x-text="new Date(agent.created_at).toLocaleDateString()"></span>
                    </div>
                </div>
            </div>

            <!-- Skills -->
            <div class="card p-6">
                <h2 class="text-xl font-semibold mb-4">Skills</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <template x-for="skill in agent.skills" :key="skill.id">
                        <div class="border border-black/5 rounded-xl p-4 hover:border-purple-200 transition">
                            <div class="flex items-center justify-between mb-2">
                                <h3 class="font-medium" x-text="skill.skill?.display_name || skill.display_name"> </h3>
                                <span class="badge" :class="skillTierClass(skill.skill?.tier || skill.tier)"
                                      x-text="skill.skill?.tier || skill.tier"></span>
                            </div>
                            <p class="text-sm text-gray-600" x-text="skill.skill?.description || skill.description"> </p>
                        </div>
                    </template>
                </div>
            </div>

            <!-- Logs (Owner Only) -->
            <div x-show="isOwner && agent.container_id" class="card p-6">
                <h2 class="text-xl font-semibold mb-4">Container Logs</h2>
                <button @click="loadLogs()" :disabled="loadingLogs" class="btn btn-ghost mb-4">
                    <span x-show="!loadingLogs">Refresh Logs</span>
                    <span x-show="loadingLogs">Loading...</span>
                </button>
                <pre x-show="logs" class="bg-gray-900 text-gray-100 p-4 rounded-lg text-sm font-mono overflow-x-auto max-h-96 overflow-y-auto" x-text="logs"></pre>
            </div>
        </div>
    </div>

    <script>
        function agentDetailApp() {
            return {
                agent: null,
                loading: true,
                isAuthenticated: false,
                isOwner: false,
                restarting: false,
                loadingLogs: false,
                logs: '',
                
                init() {
                    this.checkAuth();
                    this.loadAgent();
                },
                
                checkAuth() {
                    const token = localStorage.getItem('token');
                    this.isAuthenticated = !!token;
                },
                
                logout() {
                    localStorage.removeItem('token');
                    this.isAuthenticated = false;
                    window.location.href = '/';
                },
                
                async loadAgent() {
                    // Support both /agent-detail?id=xxx and /agents/xxx URL patterns
                    const params = new URLSearchParams(window.location.search);
                    let agentId = params.get('id') || params.get('agent_id');
                    if (!agentId) {
                        // Try to extract from path: /agents/{id}
                        const match = window.location.pathname.match(/\/agents\/([^/]+)/);
                        if (match) agentId = match[1];
                    }

                    if (!agentId) {
                        this.loading = false;
                        return;
                    }

                    try {
                        const res = await fetch(`/api/agents/${agentId}`);
                        if (res.ok) {
                            this.agent = await res.json();

                            // Determine if the current user owns this agent
                            if (this.isAuthenticated) {
                                try {
                                    const userRes = await apiFetch('/api/auth/me');
                                    if (userRes.ok) {
                                        const user = await userRes.json();
                                        this.isOwner = (this.agent.owner_id === user.id);
                                    }
                                } catch (_) {}
                            }
                        }
                    } catch (e) {
                        console.error('Failed to load agent:', e);
                    } finally {
                        this.loading = false;
                    }
                },
                
                statusBadgeClass(status) {
                    const map = {
                        'active': 'badge badge-active',
                        'idle': 'badge badge-idle',
                        'offline': 'badge badge-offline',
                        'pending': 'badge badge-pending',
                        'error': 'badge badge-error'
                    };
                    return map[status] || 'badge badge-offline';
                },

                skillTierClass(tier) {
                    const map = {
                        'core': 'bg-green-100 text-green-800',
                        'connected': 'bg-blue-100 text-blue-800',
                        'premium': 'bg-purple-100 text-purple-800'
                    };
                    return map[tier] || 'bg-green-100 text-green-800';
                },
                
                timeAgo(dateString) {
                    if (!dateString) return 'Never';
                    const date = new Date(dateString);
                    const now = new Date();
                    const seconds = Math.floor((now - date) / 1000);
                    
                    if (seconds < 60) return 'Just now';
                    if (seconds < 3600) return `${Math.floor(seconds / 60)}m ago`;
                    if (seconds < 86400) return `${Math.floor(seconds / 3600)}h ago`;
                    return `${Math.floor(seconds / 86400)}d ago`;
                },
                
                async restartAgent() {
                    this.restarting = true;
                    try {
                        const token = localStorage.getItem('token');
                        await fetch(`/api/agents/${this.agent.id}/restart`, {
                            method: 'POST',
                            headers: { 'Authorization': `Bearer ${token}` }
                        });
                        setTimeout(() => this.loadAgent(), 3000);
                    } catch (e) {
                        console.error('Failed to restart:', e);
                    } finally {
                        this.restarting = false;
                    }
                },
                
                async deleteAgent() {
                    if (!confirm('Are you sure you want to delete this agent?')) return;
                    
                    try {
                        const token = localStorage.getItem('token');
                        await fetch(`/api/agents/${this.agent.id}`, {
                            method: 'DELETE',
                            headers: { 'Authorization': `Bearer ${token}` }
                        });
                        window.location.href = '/agents';
                    } catch (e) {
                        console.error('Failed to delete:', e);
                    }
                },
                
                async loadLogs() {
                    this.loadingLogs = true;
                    try {
                        const token = localStorage.getItem('token');
                        const res = await fetch(`/api/agents/${this.agent.id}/logs`, {
                            headers: { 'Authorization': `Bearer ${token}` }
                        });
                        if (res.ok) {
                            const data = await res.json();
                            this.logs = data.logs;
                        }
                    } catch (e) {
                        console.error('Failed to load logs:', e);
                    } finally {
                        this.loadingLogs = false;
                    }
                }
            }
        }
    </script>
</body>
</html>
