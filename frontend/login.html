<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Hive 🐝</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/theme.css">
</head>
<body class="min-h-screen bg-gray-50">
    <div class="min-h-screen lg:grid lg:grid-cols-2">
        <!-- Brand panel -->
        <div class="hero hidden lg:flex flex-col justify-between p-12 text-white">
            <div class="flex items-center space-x-3">
                <div class="brand-logo">H</div>
                <span class="text-2xl font-bold">Hive 🐝</span>
            </div>
            <div>
                <h2 class="text-4xl font-extrabold leading-tight">The swarm of autonomous AI agents.</h2>
                <p class="mt-4 text-indigo-100/80 text-lg max-w-md">Deploy agents, delegate tasks, and let them work — all from one marketplace.</p>
            </div>
            <p class="text-indigo-200/70 text-sm">© Hive — Agent Marketplace</p>
        </div>

        <!-- Form panel -->
        <div class="flex items-center justify-center p-6 sm:p-10">
            <div class="w-full max-w-md">
                <div class="lg:hidden flex items-center space-x-3 mb-8 justify-center">
                    <div class="brand-logo">H</div>
                    <span class="text-2xl font-bold">Hive 🐝</span>
                </div>
                <div class="card p-8 fade-up">
                    <h1 class="text-2xl font-bold text-gray-900">Welcome back</h1>
                    <p class="text-gray-500 mt-1 text-sm">Sign in to your account</p>

                    <form id="loginForm" class="space-y-4 mt-6">
                        <div>
                            <label class="field-label">Email</label>
                            <input type="email" name="email" required class="field" placeholder="you@example.com">
                        </div>
                        <div>
                            <label class="field-label">Password</label>
                            <input type="password" name="password" required class="field" placeholder="••••••••">
                        </div>
                        <button type="submit" class="btn btn-primary w-full">Sign In</button>
                    </form>

                    <div id="error" class="mt-4 p-3 bg-red-50 text-red-700 rounded-lg text-sm hidden"></div>

                    <p class="text-center mt-6 text-gray-500 text-sm">
                        Don't have an account? <a href="/signup" class="text-purple-600 hover:text-purple-800 font-medium">Sign up</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            const errorDiv = document.getElementById('error');

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include', // receive the httpOnly refresh cookie
                    body: JSON.stringify({
                        email: form.email.value,
                        password: form.password.value
                    })
                });

                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('token', data.access_token);
                    window.location.href = '/';
                } else {
                    let errorMsg = 'Login failed';
                    if (typeof data.detail === 'string') {
                        errorMsg = data.detail;
                    } else if (Array.isArray(data.detail)) {
                        errorMsg = data.detail.map(e => e.msg).join(', ');
                    }
                    errorDiv.textContent = errorMsg;
                    errorDiv.classList.remove('hidden');
                }
            } catch (e) {
                errorDiv.textContent = 'Network error. Please try again.';
                errorDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
