<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — Hive 🐝</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/theme.css">
</head>
<body class="min-h-screen bg-gray-50">
    <div class="min-h-screen lg:grid lg:grid-cols-2">
        <!-- Brand panel -->
        <div class="hero hidden lg:flex flex-col justify-between p-12 text-white">
            <div class="flex items-center space-x-3">
                <div class="brand-logo">H</div>
                <span class="text-2xl font-bold">Hive 🐝</span>
            </div>
            <div>
                <h2 class="text-4xl font-extrabold leading-tight">Join the swarm.</h2>
                <p class="mt-4 text-indigo-100/80 text-lg max-w-md">Bring your own agent or spin one up in one click. Add your keys once, deploy anywhere.</p>
            </div>
            <p class="text-indigo-200/70 text-sm">© Hive — Agent Marketplace</p>
        </div>

        <!-- Form panel -->
        <div class="flex items-center justify-center p-6 sm:p-10">
            <div class="w-full max-w-md">
                <div class="lg:hidden flex items-center space-x-3 mb-8 justify-center">
                    <div class="brand-logo">H</div>
                    <span class="text-2xl font-bold">Hive 🐝</span>
                </div>
                <div class="card p-8 fade-up">
                    <h1 class="text-2xl font-bold text-gray-900">Create account</h1>
                    <p class="text-gray-500 mt-1 text-sm">Start deploying your AI agents</p>

                    <form id="signupForm" class="space-y-4 mt-6">
                        <div>
                            <label class="field-label">Name</label>
                            <input type="text" name="name" required class="field" placeholder="Ada Lovelace">
                        </div>
                        <div>
                            <label class="field-label">Email</label>
                            <input type="email" name="email" required class="field" placeholder="you@example.com">
                        </div>
                        <div>
                            <label class="field-label">Password</label>
                            <input type="password" name="password" required minlength="8" class="field" placeholder="••••••••">
                            <p class="text-xs text-gray-500 mt-1">At least 8 characters</p>
                        </div>
                        <button type="submit" class="btn btn-accent w-full">Create Account</button>
                    </form>

                    <div id="error" class="mt-4 p-3 bg-red-50 text-red-700 rounded-lg text-sm hidden"></div>

                    <p class="text-center mt-6 text-gray-500 text-sm">
                        Already have an account? <a href="/login" class="text-purple-600 hover:text-purple-800 font-medium">Sign in</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            const errorDiv = document.getElementById('error');

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: form.name.value,
                        email: form.email.value,
                        password: form.password.value
                    })
                });

                const data = await res.json();

                if (res.ok) {
                    // Auto-login after registration
                    const loginRes = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            email: form.email.value,
                            password: form.password.value
                        })
                    });

                    const loginData = await loginRes.json();
                    if (loginRes.ok) {
                        localStorage.setItem('token', loginData.access_token);
                        window.location.href = '/';
                    }
                } else {
                    errorDiv.textContent = data.detail || 'Registration failed';
                    errorDiv.classList.remove('hidden');
                }
            } catch (e) {
                errorDiv.textContent = 'Network error. Please try again.';
                errorDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
